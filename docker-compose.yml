version: '3.8'
services:
  crowsync:
    build: .
    container_name: crowsync-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - crowsync-data:/data
    environment:
      - CROWSYNC_PORT=8001
      - CROWSYNC_STORAGE_ROOT=/data/storage
      - CROWSYNC_DB_PATH=/data/crowsync.db
      - CROWSYNC_LOG_LEVEL=INFO
      # Required to register members after the first. Set it in a sibling .env
      # (compose substitutes ${...} from there) or the host environment.
      - CROWSYNC_ADMIN_TOKEN=${CROWSYNC_ADMIN_TOKEN:-}
      # Open LAN mode — "1" lets anyone register with just a name (no token).
      # Only for trusted/firewalled networks; never on a public-facing server.
      - CROWSYNC_OPEN_REGISTRATION=${CROWSYNC_OPEN_REGISTRATION:-}
volumes:
  crowsync-data:
    driver: local
