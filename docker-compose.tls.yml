# TLS deployment: backend behind a Caddy reverse proxy that terminates HTTPS.
#
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# This override stops publishing 8001 on the host (Caddy reaches it over the
# internal compose network) and exposes 80/443 instead. Edit the domain in
# ./Caddyfile first. See AUDIT.md S3.
services:
  crowsync:
    # Drop the public HTTP port — only Caddy talks to the backend now.
    ports: []

  caddy:
    image: caddy:2
    container_name: crowsync-caddy
    restart: unless-stopped
    depends_on:
      - crowsync
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
